name: 📊 策略回测验证

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * 0'

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: pip install requests --quiet
      
      - name: 运行回测
        run: python backtest_halfwave.py
      
      - name: 上传报告
        uses: actions/upload-artifact@v4
        with:
          name: backtest-report
          path: backtest_result.md