name: 香港六合彩短期优化预测

on:
  schedule:
    - cron: '30 13 * * *'
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 运行预测
        run: python hk_color_two_v50_fixed.py
      - name: 上传报告
        uses: actions/upload-artifact@v4
        with:
          name: lottery-report
          path: result.md