name: 香港六合彩短期优化预测

on:
  schedule:
    # 香港时间每天 21:30 运行（UTC 13:30）
    - cron: '30 13 * * *'
  workflow_dispatch:   # 支持手动触发

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖（本脚本无需额外依赖）
        run: |
          python -m pip install --upgrade pip

      - name: 运行预测脚本
        run: python hk_short_boost.py

      - name: 上传报告
        uses: actions/upload-artifact@v4
        with:
          name: lottery-report
          path: result.md