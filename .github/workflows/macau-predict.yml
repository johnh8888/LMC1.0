name: 澳门六合彩预测

on:
  schedule:
    # 每天香港时间 21:35 运行（UTC 13:35）
    - cron: '35 13 * * *'
  workflow_dispatch:   # 支持手动触发

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 运行澳门六合彩预测
        run: python macau_lottery_predict.py

      - name: 上传报告
        uses: actions/upload-artifact@v4
        with:
          name: macau-report
          path: result.md