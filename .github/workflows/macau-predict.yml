name: 澳门六合彩自动调参预测

on:
  schedule:
    - cron: '35 13 * * *'
  workflow_dispatch:


jobs:
  predict:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4


      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'


      - name: 恢复参数缓存
        id: params-cache
        uses: actions/cache@v4
        with:
          path: |
            macau_v8_best.json
          key: macau-v8-params


      - name: 运行V8预测模型
        run: python macau_color_predict_V8.py


      - name: 保存参数缓存
        uses: actions/cache@v4
        with:
          path: |
            macau_v8_best.json
          key: macau-v8-params


      - name: 上传报告
        uses: actions/upload-artifact@v4
        with:
          name: macau-v8-report
          path: result.md