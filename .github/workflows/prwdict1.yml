name: 新澳门彩预测

on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      action:
        description: '执行操作'
        required: true
        default: 'sync'
        type: choice
        options:
          - sync
          - show
          - vote
      backtest_limit:
        description: '回测期数'
        required: false
        default: 18
        type: number

jobs:
  predict:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 查看文件结构
      run: |
        echo "当前目录文件:"
        ls -la
        echo ""
        echo "Python 文件:"
        find . -name "*.py" -type f
      
    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: 安装依赖
      run: |
        pip install --upgrade pip
        
    - name: 创建数据目录
      run: mkdir -p data
      
    - name: 执行预测
      run: |
        ACTION="${{ github.event.inputs.action }}"
        BACKTEST_LIMIT="${{ github.event.inputs.backtest_limit }}"
        
        if [ "${{ github.event_name }}" == "schedule" ]; then
          ACTION="sync"
          BACKTEST_LIMIT="18"
        fi
        
        if [ -z "$ACTION" ]; then
          ACTION="sync"
        fi
        
        if [ -z "$BACKTEST_LIMIT" ] || [ "$BACKTEST_LIMIT" == "null" ]; then
          BACKTEST_LIMIT="18"
        fi
        
        BACKTEST_LIMIT=$(echo "$BACKTEST_LIMIT" | cut -d'.' -f1)
        
        echo "=========================================="
        echo "执行操作: $ACTION"
        echo "回测期数: $BACKTEST_LIMIT"
        echo "=========================================="
        
        python new.py $ACTION --backtest-limit $BACKTEST_LIMIT
        
    - name: 保存结果
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: prediction-results
        path: |
          data/
          *.db
          *.log
        retention-days: 30