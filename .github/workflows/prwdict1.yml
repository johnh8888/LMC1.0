name: 新澳门彩预测

on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      action:
        description: '执行操作'
        default: 'sync'
        type: choice
        options: [sync, show, vote]
      backtest_limit:
        description: '回测期数'
        default: 18
        type: number

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: 创建数据目录
      run: mkdir -p data
    - name: 执行预测
      run: |
        ACTION="${{ github.event.inputs.action }}"
        BACKTEST_LIMIT="${{ github.event.inputs.backtest_limit }}"
        [ "${{ github.event_name }}" == "schedule" ] && ACTION="sync"
        [ -z "$ACTION" ] && ACTION="sync"
        BACKTEST_LIMIT=$(echo "${BACKTEST_LIMIT:-18}" | cut -d'.' -f1)
        python new.py $ACTION --backtest-limit $BACKTEST_LIMIT
    - name: 显示完整结果
      if: always()
      run: |
        echo "=========================================="
        echo "完整预测结果:"
        echo "=========================================="
        cat workflow.log 2>/dev/null || echo "无日志文件"