name: 香港六合彩特二色预测

on:
  # 每天香港时间晚上 21:30 运行（UTC+8 对应 UTC 13:30）
  schedule:
    - cron: '30 13 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖（本脚本只用标准库，无额外依赖）
        run: |
          python -m pip install --upgrade pip

      - name: 运行预测脚本
        run: |
          python hk_color_two_v50_fixed.py

      - name: 上传报告作为工作流产物
        uses: actions/upload-artifact@v4
        with:
          name: lottery-report
          path: result.md

      - name: 提交报告到仓库（可选）
        # 如果您希望将报告直接推送到仓库，可以取消注释并配置 git 用户
        # 注意：需要配置 GitHub token 或 deploy key 才能推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add result.md
          git diff --staged --quiet || git commit -m "自动更新预测报告 $(date '+%Y-%m-%d')"
          git push
        # 如果不需要自动提交，可以删除此步骤