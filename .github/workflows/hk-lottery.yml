name: HK Lottery Predictor

on:
  schedule:
    # 每天香港时间 21:30 运行预测（UTC 13:30）
    - cron: '30 13 * * *'
    # 每周一 02:00 运行网格搜索（UTC）
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  search:
    if: github.event.schedule == '0 2 * * 1' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 运行网格搜索
        run: python hk_predict.py --force-search
      - name: 提交最佳参数文件
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add best_params.json last_search.txt
          git diff --staged --quiet || git commit -m "auto: update best parameters [skip ci]"
          git push
      - name: 上传搜索日志
        uses: actions/upload-artifact@v4
        with:
          name: search-log
          path: |
            best_params.json
            last_search.txt

  predict:
    needs: [search]  # 确保搜索先完成（如果不依赖，也可以独立运行）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 运行预测（自动加载已有参数）
        run: python hk_predict.py --auto-tune
      - name: 上传报告
        uses: actions/upload-artifact@v4
        with:
          name: lottery-report
          path: result.md