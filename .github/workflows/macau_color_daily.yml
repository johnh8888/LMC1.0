name: 澳门彩特二色每日预测

on:
  schedule:
    # 每天 21:30 UTC+8 执行（澳门彩通常晚间开奖，可根据实际调整）
    - cron: '30 13 * * *'   # 13:30 UTC = 21:30 UTC+8
  workflow_dispatch:        # 支持手动触发

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖（无需额外依赖，仅标准库）
        run: |
          python -m pip install --upgrade pip

      - name: 运行澳门彩特二色预测
        run: |
          python macau_color_only.py > prediction_result.txt 2>&1
          cat prediction_result.txt

      - name: 保存预测结果（可选，提交到仓库）
        run: |
          mkdir -p predictions
          cp prediction_result.txt predictions/macau_color_$(date +'%Y%m%d').txt

      - name: 上传预测结果作为 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macau-color-prediction
          path: predictions/
          retention-days: 7

      - name: 推送到仓库（可选：自动提交结果）
        if: false   # 默认关闭，需要自动提交时改为 true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions/
          git commit -m "Daily Macau color prediction $(date +'%Y-%m-%d')" || exit 0
          git push
