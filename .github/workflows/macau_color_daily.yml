name: 澳门彩特二色全自动（每周调参+每日预测）

on:
  schedule:
    - cron: '17 17 * * 0'   # 周日 17:17 UTC = 周一 01:17 UTC+8 (调参)
    - cron: '0 14 * * *'    # 每日 14:00 UTC = 22:00 UTC+8 (预测)
  workflow_dispatch:

permissions:
  contents: write   # 允许调参作业推送参数文件

jobs:
  tune:
    if: github.event.schedule == '17 17 * * 0' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 安装依赖
        run: pip install optuna
      - name: 运行调参
        run: python macau_color_only.py --tune
      - name: 提交新的参数文件
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add best_params_macau.json
          git commit -m "Weekly auto-tune Macau color params [skip ci]" || exit 0
          git push

  predict:
    if: always() && (github.event.schedule == '0 14 * * *' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 运行预测
        run: |
          python macau_color_only.py | tee prediction_result.txt
      - name: 上传预测结果
        uses: actions/upload-artifact@v4
        with:
          name: macau-color-prediction
          path: prediction_result.txt
          retention-days: 7
