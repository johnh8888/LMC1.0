name: 澳门彩特二色每日预测（动态参数）

on:
  schedule:
    - cron: '0 14 * * *'   # 每天 22:00 UTC+8
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 运行动态参数预测
        run: |
          python macau_color_adaptive.py | tee prediction_result.txt
      - name: 保存预测结果
        uses: actions/upload-artifact@v4
        with:
          name: macau-color-prediction
          path: prediction_result.txt
          retention-days: 7
