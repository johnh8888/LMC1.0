name: 老澳门彩自动预测V8.3

on:

  schedule:
    - cron: '35 13 * * *'

  workflow_dispatch:



jobs:

  oldmacau-predict:

    runs-on: ubuntu-latest

    name: 老澳门彩预测

    steps:

      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 检查文件
        run: |
          ls -la
          echo "检查老澳门彩预测脚本"
          test -f macau_predict_v816.py   # ← 改成 macau_predict_v816.py

      - name: 恢复老澳门彩参数缓存
        uses: actions/cache@v4
        with:
          path: macau_best_params.json
          key: oldmacau-v83-params-${{ github.run_id }}
          restore-keys: |
            oldmacau-v83-params-

      - name: 运行老澳门彩预测
        run: python macau_predict_v816.py   # ← 改成 macau_predict_v816.py

      - name: 保存老澳门彩参数
        uses: actions/cache@v4
        with:
          path: macau_best_params.json
          key: oldmacau-v83-params-${{ github.run_id }}

      - name: 上传老澳门彩预测报告
        uses: actions/upload-artifact@v4
        with:
          name: oldmacau-v83-report
          path: |
            macau_result_v816.md
            macau_result.md
          retention-days: 7

      - name: 上传老澳门彩日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oldmacau-v83-log
          path: oldmacau_v83.log
          retention-days: 3