name: 新澳门六合彩自动预测V8.3

on:
  schedule:
    - cron: '35 13 * * *'
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install requests --quiet
          echo "✅ 依赖安装完成"

      - name: 检查文件
        run: |
          ls -la
          echo "🔍 检查预测脚本..."
          # 改为检查实际存在的文件
          test -f macau_color_predict_V8.py
          echo "✅ 脚本文件存在"

      - name: 恢复参数缓存
        uses: actions/cache@v4
        with:
          path: macau_best_params.json
          key: macau-v83-params-${{ github.run_id }}
          restore-keys: |
            macau-v83-params-

      - name: 运行预测
        run: |
          echo "🚀 开始运行预测..."
          python macau_color_predict_V8.py
          echo "✅ 预测完成"

      - name: 保存参数
        uses: actions/cache@v4
        with:
          path: macau_best_params.json
          key: macau-v83-params-${{ github.run_id }}

      - name: 上传预测报告
        uses: actions/upload-artifact@v4
        with:
          name: macau-v83-report
          path: |
            result.md
            newmacau_result_v817.md
            macau_best_params.json