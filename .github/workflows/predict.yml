name: 🎯 新澳门六合彩每日预测

on:
  schedule:
    - cron: '35 13 * * *'
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: pip install requests --quiet
      
      - name: 运行预测
        run: python macau_predict.py
      
      - name: 上传报告
        uses: actions/upload-artifact@v4
        with:
          name: predict-report
          path: result.md
      
      - name: 打印结果
        run: |
          echo "========================================"
          echo "📋 今日预测结果"
          echo "========================================"
          cat result.md