name: 自动预测 + 部署结算表

on:
  schedule:
    # 每天香港时间 16:00 和 21:00 运行（根据你实际开奖时间调整）
    - cron: '0 8,13 * * *'   # UTC 8:00=HK 16:00, UTC 13:00=HK 21:00
  workflow_dispatch:          # 允许手动触发

jobs:
  predict-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install pandas openpyxl  # 确保有操作 Excel 的库

      - name: 运行香港预测脚本
        run: |
          python hongkong_predict_v816.py --output predictions_hk.json
        continue-on-error: true   # 即使出错也继续

      - name: 运行澳门预测脚本
        run: |
          python macau_predict_v816.py --output predictions_macau.json
        continue-on-error: true

      - name: 运行回测脚本（可选）
        run: |
          python backtest_halfwave_strategy.py --export results.json
        continue-on-error: true

      - name: 更新 index.html 的赔率/预测数据
        run: |
          python -c "
import json, re
from datetime import datetime

# 读取预测结果
try:
    with open('predictions_hk.json') as f:
        hk = json.load(f)
except:
    hk = {}
try:
    with open('predictions_macau.json') as f:
        macau = json.load(f)
except:
    macau = {}

# 读取 index.html
with open('index.html', 'r', encoding='utf-8') as f:
    html = f.read()

# 在页面中插入预测数据（用 <script> 标签注入）
inject_script = f'''
<script>
// ===== 自动注入预测数据 =====
const AI_PREDICT = {{
  hk: {json.dumps(hk)},
  macau: {json.dumps(macau)},
  update_time: '{datetime.now().isoformat()}'
}};
console.log('AI预测数据已加载', AI_PREDICT);
</script>
'''

# 插入到 </body> 之前
html = html.replace('</body>', inject_script + '\n</body>')

with open('index.html', 'w', encoding='utf-8') as f:
    f.write(html)
print('✅ index.html 已更新预测数据')
"

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html predictions_*.json results.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🤖 自动预测更新 $(date '+%Y-%m-%d %H:%M')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages   # 或 main，看你 Pages 设置