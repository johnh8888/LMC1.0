name: 澳门六合彩预测

on:
  schedule:
    # 澳门六合彩开奖时间通常与香港相近，可设为香港时间 21:35
    - cron: '35 13 * * *'
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 运行澳门六合彩预测
        run: python macau_lottery_predict.py
      - name: 上传报告
        uses: actions/upload-artifact@v4
        with:
          name: macau-lottery-report
          path: result.md